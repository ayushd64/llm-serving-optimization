# config.yaml
prompt: "Explain what a GPU is in two sentences."
warmup_runs: 2
trial_runs: 10

# Generation controls applied to BOTH engines, so the comparison is fair
temperature: 0
max_tokens: 256

# Every engine we can benchmark. We run ONE at a time (8 GB can't hold both).
engines:
  - name: "ollama"
    url: "http://127.0.0.1:11434/api/generate"
    model: "qwen2.5:1.5b-instruct-fp16"
  - name: "vllm"
    url: "http://127.0.0.1:8000/v1/chat/completions"
    model: "Qwen/Qwen2.5-1.5B-Instruct"

